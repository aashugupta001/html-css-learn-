<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Property </title>
    <style>
        *{
            text-align: center;
        }
        h1{
            color:aquamarine;
            font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
            text-align: center;

        }
        p{
            color:rgb(83, 37, 188);
            font-family: Arial, Helvetica, sans-serif;
            font-size: larger;
        }
        pre p{
            font-weight: 400;
            font-family: Georgia, 'Times New Roman', Times, serif;
            color:rgb(72, 150, 103);
        }

    </style>
</head>
<body>
    <h1>Text Style Property</h1>
    <p>
        There are lots of font / text property 

    </p>
    <pre><p>Everyday you want to learn new things by hook for cook </p></pre>

    
</body>
</html>
