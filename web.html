<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .subscribe{
            background-color: rgb(180, 60, 60);
            color:white;
            border:none;
            height: 67px;
            width: 98px;
            cursor:pointer;
            margin-right: 45px;

        }
        button{
            background-color: rgb(55, 255, 0);
            color:white;
            /* border:none; */
            height: 67px;
            width:98px;
            border-radius: 5px;
            border-width: 3px;
            border-color:rgb(140, 0, 255);
            cursor:pointer;
            border-style:solid;
            
        }
        .next-button{
            background-color: blue;
            color:white;
            border:none;
            height:36px;
            width:105px;
            border-radius: 18px;
            font-weight: bold;
            font-size:15px;
            cursor:pointer
            /* margin-left: 45px; */
        }
        .next-button:hover{

            background-color: black;
        }
        .next-button:active{
            background-color: bisque;
        }

    </style>
</head>
<body>
    <button class="subscribe">subscribe</button>
    <button>join</button>
    <button class="next-button">class</button>

    
</body>
</html>
