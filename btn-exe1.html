<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box-model</title>
    <style>
        .first{
            background-color:black;
            color:white;
            width:90px;
            height:50px;
            
        }
        .second{
            background-color: yellow;
            color:black;
            width:160px;
            height:55;
            border-radius: 45px;;

        }
        .third{
            background-color: green;
            color:white;
            border-radius: 7px;
            height: 50px;
            width:140px


            
        }
        .fourth{
            background-color: blueviolet;
            color:white;
            height:50px;
            width:160px;
            border-radius: 5px;


        }
        .fifth{
            background-color: white;
            color:brown;
             height:50px;
            width:140px;
            border-radius: 6px;


        }
        .fifth:hover{
            background-color: brown;
            color:white;
            transition:opacity 0.5s;

            
        }
        .sixth{
            background-color: blue;
            color:white;
             width:190px;
            height:45;
            border-radius: 45px;



        }
        .seven{
            background-color: white;
            color:blue;
             width:120px;
            height:45;
            border-radius: 45px;
            cursor:pointer;


        }

    </style>
</head>
<body>
    <header>
        <button class="first">Request me </button>
        <button class="second">Add to cart</button>
        <button class="third">Sign up</button>
        <button class="fourth">Get Started</button>
        <button class="fifth">Download</button>
        <button class="sixth">Apply on company website</button>
        <button class="seven">Save</button>

    </header>
    
</body>
</html>
