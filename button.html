<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buttons</title>
    <style>
        * {
            background-color: Black;
        }

        p {
            background-color: white;
            width: 137px;
            height: 138px;


        }

        .first-button {
            background-color: black;
            width: 137px;
            height: 138px;
            /* border-radius: none; */
            border-color: red;

            border-radius: 43px;

            color: white;
        }

        .first-button:hover {
            background-color: pink;
            color: green;

        }

        .first-button:active {
            background-color: rgb(108, 173, 191);
            color: rgb(161, 22, 22);
        }
        .next{
            background-color: white;
            width: 137px;
            height: 138px;
        }
        .second-button{
            background-color: rgb(55, 245, 77);
            width: 137px;
            height: 138px;
            border-radius: none;
            border-color: red;

            border-radius: 43px;

            color: white;
        }
        .second-button:hover{
            background-color: rgb(163, 80, 208);
            color:beige;
        }
        .third{
            background-color: white;
            width: 137px;
            height: 138px;

        }
        .thier-button{
            background-color: rgb(37, 123, 169);
            width: 137px;
            height: 138px;
            border-radius: 34px;
            border-color: rgb(24, 67, 187);

            border-radius: 60px;

            color: white;

        }
        .thier-button:hover{
            background-color: rgb(163, 80, 208);
            color:chartreuse;
            border-bottom: 2px solid rgb(25, 25, 26);

        }

    </style>
</head>

<body>
    <p>
        <button class="first-button">Request me </button>
    </p><p class="next">
        <button class="second-button">Second Button</button>

    </p>
    <p class="third">
        <button class="thier-button">Third Button</button>
    </p>






</body>

</html>
